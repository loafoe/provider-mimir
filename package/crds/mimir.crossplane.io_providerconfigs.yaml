                        type: string
                      namespace:
                        description: Namespace of the secret.
                        type: string
                    required:
                    - key
                    - name
                    - namespace
                    type: object
                  insecure:
                    description: Insecure skips TLS certificate verification.
                    type: boolean
                  keySecretRef:
                    description: KeySecretRef is a reference to a secret key containing
                      the client key.
                    properties:
                      key:
                        description: The key to select.
                        type: string
                      name:
                        description: Name of the secret.
                        type: string
                      namespace:
                        description: Namespace of the secret.
