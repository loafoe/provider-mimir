      type: date
    - jsonPath: .spec.uri
      name: URI
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: A ProviderConfig configures a Mimir provider.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ProviderConfigSpec defines the configuration for connecting
              to Mimir.
            properties:
              alertmanagerUri:
                description: |-
                  AlertmanagerURI is the URL of the Mimir alertmanager component.
                  If not specified, defaults to URI.
                type: string
              credentials:
                description: Credentials contains authentication configuration for
                  Mimir.
                properties:
                  authType:
                    description: AuthType specifies the type of authentication to
                      use.
                    enum:
                    - basic
                    - token
                    type: string
                  basicAuth:
                    description: |-
                      BasicAuth contains credentials for HTTP Basic Authentication.
                      Required when authType is "basic".
                    properties:
                      passwordSecretRef:
                        description: PasswordSecretRef is a reference to a secret
                          key containing the password.
                        properties:
                          key:
                            description: The key to select.
                            type: string
                          name:
                            description: Name of the secret.
                            type: string
                          namespace:
                            description: Namespace of the secret.
                            type: string
                        required:
                        - key
                        - name
                        - namespace
                        type: object
                      usernameSecretRef:
                        description: UsernameSecretRef is a reference to a secret
